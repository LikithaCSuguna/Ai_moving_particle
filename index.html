<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moving Particles</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">ParticleZen</div>
            <div class="instructions">
                <div>Open hand to Expand</div>
                <div>Fist to Compress</div>
            </div>
            <div class="camera-status">
                <div class="camera-feed">
                    <video id="webcam" width="160" height="120" autoplay muted></video>
                    <div class="vision-active">VISION ACTIVE</div>
                </div>
            </div>
        </header>

        <main>
            <canvas id="particleCanvas"></canvas>
        </main>

        <footer>
            <div class="templates">
                <h3>TEMPLATES</h3>
                <div class="template-buttons">
                    <button class="template-btn active" data-shape="sphere">Sphere</button>
                    <button class="template-btn" data-shape="heart">Heart</button>
                    <button class="template-btn" data-shape="saturn">Saturn</button>
                    <button class="template-btn" data-shape="flower">Flower</button>
                    <button class="template-btn" data-shape="zen">Zen</button>
                    <button class="template-btn" data-shape="burst">Burst</button>
                </div>
            </div>
        </footer>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/handtrackjs@0.0.13/dist/handtrack.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
