<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moving Particles - Gesture Controlled</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; font-family: 'Inter', sans-serif; }
        canvas { display: block; }
        
        /* Glassmorphism UI */
        .glass-panel {
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }

        .btn-option {
            transition: all 0.3s ease;
        }
        .btn-option:hover, .btn-option.active {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
        }

        #loading-overlay {
            transition: opacity 0.5s ease;
        }

        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            overflow: hidden;
            cursor: pointer;
            padding: 0;
        }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 50%; }
    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div id="loading-overlay" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-black text-white">
        <div class="w-16 h-16 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
        <h2 class="text-xl font-light tracking-widest uppercase">Initializing Vision Engine...</h2>
        <p class="text-sm text-gray-400 mt-2">Connecting to camera</p>
    </div>

    <!-- Main UI Overlay -->
    <div class="absolute inset-0 pointer-events-none z-10 flex flex-col justify-between p-4 md:p-8">
        
        <!-- Header -->
        <div class="flex justify-between items-start pointer-events-auto">
            <div>
                <h1 class="text-white text-2xl md:text-4xl font-bold tracking-tighter drop-shadow-lg">Moving <span class="text-blue-400">Particles</span></h1>
                <p class="text-gray-400 text-xs md:text-sm mt-1 flex items-center gap-2">
                    <i class="fa-solid fa-hand text-blue-400"></i> Open hand to Expand
                    <span class="w-1 h-1 bg-gray-600 rounded-full"></span>
                    <i class="fa-solid fa-hand-fist text-red-400"></i> Fist to Compress
                </p>
            </div>
            
            <!-- Webcam Preview -->
            <div class="relative w-32 h-24 md:w-48 md:h-36 glass-panel rounded-xl overflow-hidden shadow-lg border border-gray-700/50">
                <video id="webcam" class="absolute inset-0 w-full h-full object-cover transform -scale-x-100 opacity-80" autoplay playsinline muted></video>
                <div class="absolute bottom-1 right-2 text-[10px] text-white/70 font-mono uppercase">Vision Stream</div>
                <div id="hand-indicator" class="absolute top-2 right-2 w-3 h-3 rounded-full bg-red-500 shadow-[0_0_10px_rgba(239,68,68,0.8)] transition-colors duration-300"></div>
            </div>
        </div>

        <!-- Controls Bottom -->
        <div class="pointer-events-auto self-center md:self-end w-full md:max-w-xl">
            <div class="glass-panel rounded-2xl p-4 flex flex-col gap-4">
                
                <div class="flex items-center justify-between gap-4">
                    <span class="text-white text-sm font-medium uppercase tracking-wider text-xs">Geometric Templates</span>
                    <input type="color" id="color-picker" value="#44aaff" title="Change Particle Color">
                </div>

                <div class="grid grid-cols-3 md:grid-cols-5 lg:grid-cols-9 gap-2">
                    <button class="btn-option active flex flex-col items-center gap-1 p-2 rounded-xl border border-transparent bg-white/5 text-white" onclick="changeShape('sphere')">
                        <i class="fa-solid fa-globe text-base"></i>
                        <span class="text-[9px]">Sphere</span>
                    </button>
                    <button class="btn-option flex flex-col items-center gap-1 p-2 rounded-xl border border-transparent bg-white/5 text-white" onclick="changeShape('star')">
                        <i class="fa-solid fa-star text-base"></i>
                        <span class="text-[9px]">Star</span>
                    </button>
                    <button class="btn-option flex flex-col items-center gap-1 p-2 rounded-xl border border-transparent bg-white/5 text-white" onclick="changeShape('diamond')">
                        <i class="fa-solid fa-gem text-base"></i>
                        <span class="text-[9px]">Diamond</span>
                    </button>
                    <button class="btn-option flex flex-col items-center gap-1 p-2 rounded-xl border border-transparent bg-white/5 text-white" onclick="changeShape('apple')">
                        <i class="fa-solid fa-apple-whole text-base"></i>
                        <span class="text-[9px]">Apple</span>
                    </button>
                    <button class="btn-option flex flex-col items-center gap-1 p-2 rounded-xl border border-transparent bg-white/5 text-white" onclick="changeShape('heart')">
                        <i class="fa-solid fa-heart text-base"></i>
                        <span class="text-[9px]">Heart</span>
                    </button>
                    <button class="btn-option flex flex-col items-center gap-1 p-2 rounded-xl border border-transparent bg-white/5 text-white" onclick="changeShape('saturn')">
                        <i class="fa-solid fa-ring text-base"></i>
                        <span class="text-[9px]">Saturn</span>
                    </button>
                    <button class="btn-option flex flex-col items-center gap-1 p-2 rounded-xl border border-transparent bg-white/5 text-white" onclick="changeShape('flower')">
                        <i class="fa-brands fa-pagelines text-base"></i>
                        <span class="text-[9px]">Flower</span>
                    </button>
                    <button class="btn-option flex flex-col items-center gap-1 p-2 rounded-xl border border-transparent bg-white/5 text-white" onclick="changeShape('zen')">
                        <i class="fa-solid fa-user-astronaut text-base"></i>
                        <span class="text-[9px]">Zen</span>
                    </button>
                    <button class="btn-option flex flex-col items-center gap-1 p-2 rounded-xl border border-transparent bg-white/5 text-white" onclick="changeShape('fireworks')">
                        <i class="fa-solid fa-explosion text-base"></i>
                        <span class="text-[9px]">Burst</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Three.js Container -->
    <div id="canvas-container" class="w-full h-full"></div>

    <!-- Logic -->
    <script type="module">
        import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
        import { FilesetResolver, HandLandmarker } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/+esm";

        // --- Configuration ---
        const PARTICLE_COUNT = 18000;
        const PARTICLE_SIZE = 0.08;
        let CURRENT_SHAPE = 'sphere';
        let HAND_INFLUENCE = 0; 
        let ROTATION_TARGET_X = 0;
        let ROTATION_TARGET_Y = 0;

        // --- Three.js Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050505, 0.02);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 8;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(PARTICLE_COUNT * 3);
        const targetPositions = new Float32Array(PARTICLE_COUNT * 3);
        
        for (let i = 0; i < PARTICLE_COUNT * 3; i++) {
            positions[i] = (Math.random() - 0.5) * 20;
            targetPositions[i] = positions[i];
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

        const spriteTexture = new THREE.TextureLoader().load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/sprites/disc.png');

        const material = new THREE.PointsMaterial({
            color: 0x44aaff,
            size: PARTICLE_SIZE,
            map: spriteTexture,
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            sizeAttenuation: true
        });

        const particles = new THREE.Points(geometry, material);
        scene.add(particles);

        // --- Shape Generators ---
        
        function getPointOnSphere() {
            const u = Math.random();
            const v = Math.random();
            const theta = 2 * Math.PI * u;
            const phi = Math.acos(2 * v - 1);
            const r = 3;
            return {
                x: r * Math.sin(phi) * Math.cos(theta),
                y: r * Math.sin(phi) * Math.sin(theta),
                z: r * Math.cos(phi)
            };
        }

        function getPointOnDiamond() {
            const u = Math.random() * 2 - 1;
            const v = Math.random() * 2 - 1;
            const w = Math.random() * 2 - 1;
            const sum = Math.abs(u) + Math.abs(v) + Math.abs(w);
            const scale = 3.5;
            return {
                x: (u / sum) * scale,
                y: (v / sum) * scale,
                z: (w / sum) * scale
            };
        }

        function getPointOnStar() {
            const points = 5;
            const innerRadius = 1.2;
            const outerRadius = 3.5;
            const angleStep = (Math.PI * 2) / points;
            const segment = Math.floor(Math.random() * points);
            const t = Math.random();
            const angle = segment * angleStep + t * angleStep;
            const r = t < 0.5 ? 
                THREE.MathUtils.lerp(outerRadius, innerRadius, t * 2) : 
                THREE.MathUtils.lerp(innerRadius, outerRadius, (t - 0.5) * 2);
            const z = (Math.random() - 0.5) * 1.5;
            return { x: Math.cos(angle) * r, y: Math.sin(angle) * r, z: z };
        }

        function getPointOnApple() {
            // Corrected parametric apple surface (Standing Upright)
            const u = Math.random() * Math.PI * 2; 
            const v = Math.random() * Math.PI;     

            // Indent at top (v=0) and bottom (v=PI) using a cardiode-like profile
            const r = (1 + 0.1 * Math.cos(u)) * (2 + 1.2 * Math.sin(v) + 0.4 * Math.cos(3 * v));
            
            let x = r * Math.sin(v) * Math.cos(u) * 0.7;
            // Negative Y for correctly upright orientation (flipping the previous 'ulta' version)
            let y = -r * Math.cos(v) * 0.8;
            let z = r * Math.sin(v) * Math.sin(u) * 0.7;

            // Upright stem logic (top of the apple)
            if (Math.random() > 0.96) {
                return {
                    x: (Math.random() - 0.5) * 0.2,
                    y: 2.2 + Math.random() * 1.0,
                    z: (Math.random() - 0.5) * 0.2
                };
            }

            return { x, y: y + 0.2, z };
        }

        function getPointOnHeart() {
            let t = Math.random() * Math.PI * 2;
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
            const z = (Math.random() - 0.5) * 4; 
            return { x: x * 0.2, y: y * 0.2, z: z };
        }

        function getPointOnSaturn() {
            const r = Math.random();
            if (r > 0.4) {
                const angle = Math.random() * Math.PI * 2;
                const dist = 4 + Math.random() * 3;
                return { x: Math.cos(angle) * dist, y: (Math.random() - 0.5) * 0.2, z: Math.sin(angle) * dist };
            } else {
                const pt = getPointOnSphere();
                return { x: pt.x * 0.6, y: pt.y * 0.6, z: pt.z * 0.6 };
            }
        }

        function getPointOnFlower() {
            const u = Math.random() * Math.PI * 2;
            const v = Math.random() * Math.PI;
            const k = 4;
            const r = 2 + Math.cos(k * u) * Math.sin(v);
            return { x: r * Math.cos(u) * Math.sin(v), y: r * Math.cos(v) + 2, z: r * Math.sin(u) * Math.sin(v) };
        }

        function getPointOnZen() {
            const r = Math.random();
            let p = {x:0, y:0, z:0};
            if (r < 0.25) { 
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                const rad = 0.8;
                p.x = rad * Math.sin(phi) * Math.cos(theta);
                p.y = rad * Math.sin(phi) * Math.sin(theta) + 1.8;
                p.z = rad * Math.cos(phi);
            } else if (r < 0.7) { 
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                p.x = 1.2 * Math.sin(phi) * Math.cos(theta);
                p.y = 1.5 * Math.sin(phi) * Math.sin(theta);
                p.z = 1.0 * Math.cos(phi);
            } else { 
                const angle = Math.random() * Math.PI * 2;
                const dist = 1.5 + Math.random();
                p.x = Math.cos(angle) * dist;
                p.y = -1.5 + (Math.random() - 0.5) * 0.5;
                p.z = Math.sin(angle) * dist * 0.5 + 0.5;
            }
            return p;
        }

        function getPointOnFireworks() {
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            const rad = 2 + Math.random() * 5; 
            return { x: rad * Math.sin(phi) * Math.cos(theta), y: rad * Math.sin(phi) * Math.sin(theta), z: rad * Math.cos(phi) };
        }

        // --- Morphing Logic ---

        function generateShape(type) {
            const arr = targetPositions;
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                let p;
                switch (type) {
                    case 'heart': p = getPointOnHeart(); break;
                    case 'saturn': p = getPointOnSaturn(); break;
                    case 'flower': p = getPointOnFlower(); break;
                    case 'zen': p = getPointOnZen(); break;
                    case 'fireworks': p = getPointOnFireworks(); break;
                    case 'star': p = getPointOnStar(); break;
                    case 'diamond': p = getPointOnDiamond(); break;
                    case 'apple': p = getPointOnApple(); break;
                    case 'sphere': default: p = getPointOnSphere(); break;
                }
                arr[i * 3] = p.x;
                arr[i * 3 + 1] = p.y;
                arr[i * 3 + 2] = p.z;
            }
        }

        window.changeShape = (type) => {
            CURRENT_SHAPE = type;
            generateShape(type);
            document.querySelectorAll('.btn-option').forEach(btn => btn.classList.remove('active'));
            if (event) event.currentTarget.classList.add('active');
        };

        document.getElementById('color-picker').addEventListener('input', (e) => {
            material.color.set(e.target.value);
        });

        generateShape('sphere');

        // --- MediaPipe Hand Tracking ---
        let handLandmarker = undefined;
        let webcamRunning = false;
        const video = document.getElementById("webcam");
        const handIndicator = document.getElementById("hand-indicator");

        async function createHandLandmarker() {
            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm");
            handLandmarker = await HandLandmarker.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
                    delegate: "GPU"
                },
                runningMode: "VIDEO",
                numHands: 1
            });
            document.getElementById('loading-overlay').style.opacity = '0';
            setTimeout(() => document.getElementById('loading-overlay').remove(), 500);
            enableCam();
        }

        function enableCam() {
            navigator.mediaDevices.getUserMedia({ video: true }).then((stream) => {
                video.srcObject = stream;
                video.addEventListener("loadeddata", predictWebcam);
                webcamRunning = true;
            });
        }

        let lastVideoTime = -1;
        async function predictWebcam() {
            if (video.currentTime !== lastVideoTime) {
                lastVideoTime = video.currentTime;
                const results = handLandmarker.detectForVideo(video, performance.now());
                if (results.landmarks && results.landmarks.length > 0) {
                    const landmarks = results.landmarks[0];
                    const wrist = landmarks[0];
                    const tips = [4, 8, 12, 16, 20];
                    let avgDist = 0;
                    tips.forEach(idx => {
                        const dx = landmarks[idx].x - wrist.x;
                        const dy = landmarks[idx].y - wrist.y;
                        avgDist += Math.sqrt(dx*dx + dy*dy);
                    });
                    avgDist /= 5;
                    let openness = (avgDist - 0.2) / (0.3);
                    openness = Math.max(0, Math.min(1, openness));
                    HAND_INFLUENCE += (openness - HAND_INFLUENCE) * 0.1;
                    handIndicator.style.backgroundColor = HAND_INFLUENCE > 0.5 ? "#3b82f6" : "#ef4444";
                    ROTATION_TARGET_X = (landmarks[9].y - 0.5) * 2;
                    ROTATION_TARGET_Y = (landmarks[9].x - 0.5) * 4;
                } else {
                    HAND_INFLUENCE += (0.5 - HAND_INFLUENCE) * 0.05;
                }
            }
            if (webcamRunning) window.requestAnimationFrame(predictWebcam);
        }

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();
            const positionsAttribute = geometry.attributes.position;
            const currentPositions = positionsAttribute.array;
            const baseScale = 0.5 + (HAND_INFLUENCE * 1.5);
            const explosionFactor = Math.max(0, HAND_INFLUENCE - 0.7) * 3;

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const ix = i * 3, iy = i * 3 + 1, iz = i * 3 + 2;
                const tx = targetPositions[ix], ty = targetPositions[iy], tz = targetPositions[iz];
                const noise = Math.sin(time + ix) * 0.02 * (1 + explosionFactor);
                const destX = tx * baseScale + noise;
                const destY = ty * baseScale + noise;
                const destZ = tz * baseScale + noise;
                currentPositions[ix] += (destX - currentPositions[ix]) * 0.1;
                currentPositions[iy] += (destY - currentPositions[iy]) * 0.1;
                currentPositions[iz] += (destZ - currentPositions[iz]) * 0.1;
            }
            positionsAttribute.needsUpdate = true;
            particles.rotation.y += (ROTATION_TARGET_Y - particles.rotation.y) * 0.05;
            particles.rotation.x += (ROTATION_TARGET_X - particles.rotation.x) * 0.05;
            if(Math.abs(ROTATION_TARGET_Y) < 0.1) particles.rotation.y += 0.002;
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        createHandLandmarker();
        animate();
    </script>
</body>
</html>
